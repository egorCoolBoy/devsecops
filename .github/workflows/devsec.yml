name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  # -------------------------
  # BUILD
  # -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-dotnet-api .

      - name: Save image
        run: docker save my-dotnet-api > image.tar

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 7

  # -------------------------
  # SAST (Semgrep + custom rules)
  # -------------------------
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan (semgrep-rules.yml)
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            --entrypoint semgrep \
            semgrep/semgrep \
            --config semgrep-rules.yml \
            --no-git-ignore . \
            --json \
            --output semgrep-report.json || true

      - name: Format Semgrep report
        if: always()
        run: |
          if [ -f semgrep-report.json ]; then
            python3 -m json.tool semgrep-report.json > semgrep-report-pretty.json
          else
            echo '{"error": "semgrep-report.json was not generated"}' > semgrep-report-pretty.json
          fi

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-report.json
            semgrep-report-pretty.json
          retention-days: 7

  # -------------------------
  # DAST (OWASP ZAP + custom rules)
  # -------------------------
  dast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/swagger/v1/swagger.json > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $i/40..."
            sleep 3
          done
          echo "API did not become ready in time"
          docker compose logs backend
          exit 1

      - name: Run OWASP ZAP scan (zap-rules.tsv)
        if: always()
        run: |
          mkdir -p zap-output
          chmod 777 zap-output

          docker run --rm \
            --name zap-scan \
            --user root \
            --network host \
            -v "$PWD/zap-output:/zap/wrk:rw" \
            -v "$PWD/zap-rules.tsv:/zap/config/zap-rules.tsv:ro" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
              -t http://localhost:8080/swagger/v1/swagger.json \
              -f openapi \
              -c /zap/config/zap-rules.tsv \
              -r /zap/wrk/zap-report.html \
              -w /zap/wrk/zap-report.md \
              -J /zap/wrk/zap-report.json \
              -I || true

      - name: Format ZAP report
        if: always()
        run: |
          if [ -f zap-output/zap-report.json ]; then
            python3 -m json.tool zap-output/zap-report.json > zap-output/zap-report-pretty.json
          else
            echo '{"error": "zap-report.json was not generated"}' > zap-output/zap-report-pretty.json
          fi

      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-output/
          retention-days: 7

      - name: Shutdown
        if: always()
        run: docker compose down -v

  # -------------------------
  # SCA (OWASP Dependency Check)
  # -------------------------
  sca:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Restore dependencies
        run: dotnet restore

      - name: Download Dependency-Check
        run: |
          wget https://github.com/dependency-check/DependencyCheck/releases/download/v12.2.2/dependency-check-12.2.2-release.zip
          unzip dependency-check-12.2.2-release.zip

      - name: Run Dependency-Check scan
        continue-on-error: true
        run: |
          chmod +x dependency-check/bin/dependency-check.sh
          
          dependency-check/bin/dependency-check.sh \
            --scan WebApplication5.csproj \
            --scan obj/project.assets.json \
            --project OsaCrud \
            --format ALL \
            --prettyPrint \
            --out report \
            --failOnCVSS 11

      - name: Upload Dependency-Check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: report/dependency-check-report.*

