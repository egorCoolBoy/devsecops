  name: DevSecOps Pipeline
  
  on:
    push:
      branches:
        - main
    pull_request:
  
  permissions:
    contents: read
    issues: write
  
  jobs:
    
    # -------------------------
    # SAST (Semgrep)
    # -------------------------
    sast:
      name: SAST Semgrep
      runs-on: ubuntu-latest
      
      container:
        image: semgrep/semgrep:latest
      
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Create reports folder
          run: mkdir -p reports

        - name: Run Semgrep
          continue-on-error: true
          run: |
            semgrep scan \
              --config semgrep-rules.yml \
              --sarif \
              --output reports/semgrep.sarif .

        - name: Upload SAST report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: semgrep-report
            path: reports/semgrep.sarif
            retention-days: 7
    
    # -------------------------
    # SCA (OWASP Dependency-Check - stable version)
    # -------------------------
    sca:
      name: SCA Dependency Check
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Java
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "21"

        - name: Download Dependency-Check
          run: |
            wget https://github.com/dependency-check/DependencyCheck/releases/download/v12.2.2/dependency-check-12.2.2-release.zip
            unzip dependency-check-12.2.2-release.zip

        - name: Run Dependency-Check
          continue-on-error: true
          run: |
            chmod +x dependency-check/bin/dependency-check.sh
            
            dependency-check/bin/dependency-check.sh \
              --scan . \
              --format ALL \
              --project OsaCrud \
              --out reports \
              --failOnCVSS 11

        - name: Upload SCA report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: dependency-check-report
            path: reports/
            retention-days: 7
    
    # -------------------------
    # DAST (OWASP ZAP)
    # -------------------------
    dast:
      name: DAST OWASP ZAP
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build and start containers
          run: docker compose up -d --build

        - name: Wait for API
          run: |
            echo "Waiting for API..."
            
            for i in $(seq 1 40); do
              if curl -fsS http://localhost:8080/swagger/v1/swagger.json > /dev/null; then
                echo "API is ready"
                exit 0
              fi
              sleep 3
            done
            
            echo "API failed to start"
            docker compose logs
            exit 1

        - name: Run ZAP API Scan
          uses: zaproxy/action-api-scan@v0.9.0
          with:
            target: "http://localhost:8080/swagger/v1/swagger.json"
            format: openapi
            rules_file_name: zap-rules.tsv
            fail_action: false
            allow_issue_writing: false
            cmd_options: "-J zap-report.json -r zap-report.html"

        - name: Upload ZAP report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: zap-report
            path: |
              zap-report.json
              zap-report.html

        - name: Shutdown stack
          if: always()
          run: docker compose down -v
