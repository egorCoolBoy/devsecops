name: SAST Semgrep

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Semgrep scan (JSON)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/dotnet \
            --config semgrep-rules.yml \
            --json \
            --output reports/semgrep.json .

      - name: Pretty JSON
        run: |
          python -m json.tool reports/semgrep.json > reports/semgrep-pretty.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            reports/semgrep.json
            reports/semgrep-pretty.json