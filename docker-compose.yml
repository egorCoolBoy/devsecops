services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: egor
      POSTGRES_USER: egor
      POSTGRES_PASSWORD: postgres
    volumes:
      - psql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egor -d egor"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: osabackend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Host=db;Database=egor;Username=egor;Password=postgres;Port=5432
    ports:
      - "8080:8080"

volumes:
  psql_data: