stages:
  - build
  - sast
  - dast
  - sca

# ---------------------
# BUILD
# ---------------------
build:
  stage: build
  image: docker:latest
  script:
    - docker build -t my-dotnet-api .

# ---------------------
# SAST (Semgrep)
# ---------------------
semgrep:
  stage: sast
  image: semgrep/semgrep:latest

  script:
    - semgrep --config semgrep-rules.yml --no-git-ignore . --json --output semgrep-report.json
    - apk add --no-cache python3
    - python3 -m json.tool semgrep-report.json > semgrep-report-pretty.json

  artifacts:
    when: always
    paths:
      - semgrep-report.json
      - semgrep-report-pretty.json

# ---------------------
# DAST (OWASP ZAP)
# ---------------------
zap:
  stage: dast
  image: docker:latest

  before_script:
    - docker rm -f api postgres zap-scan || true
    - docker network rm zapnet || true
    - docker network create zapnet

  script:
    # Запускаем postgres
    - |
      docker run -d --name postgres --network zapnet \
        -e POSTGRES_DB=KB \
        -e POSTGRES_USER=postgres \
        -e POSTGRES_PASSWORD=890981298e \
        postgres:16-alpine

    # Ждём postgres
    - |
      docker run --rm --network zapnet postgres:16-alpine sh -c "
        until pg_isready -h postgres -U postgres; do
          echo 'waiting postgres...'
          sleep 2
        done
      "

    # Запускаем API с подключением к postgres в сети
    - |
      docker run -d --name api --network zapnet \
        -e "ConnectionStrings__DefaultConnection=Host=postgres;Database=KB;Username=postgres;Password=890981298e;Port=5432" \
        -e "ASPNETCORE_ENVIRONMENT=Development" \
        my-dotnet-api

    # Ждём API
    - |
      docker run --rm --network zapnet alpine sh -c "
        apk add --no-cache curl -q &&
        timeout 60 sh -c 'until curl -fsS http://api:8080/swagger/v1/swagger.json > /dev/null; do echo waiting api...; sleep 3; done'
      " || (echo "=== API LOGS ===" && docker logs api && exit 1)

    # Запускаем ZAP
      # Запускаем ZAP
    - |
      ZAP_RULES=$(cat "$CI_PROJECT_DIR/zap-rules.tsv")
      docker run --name zap-scan \
        --network zapnet \
        --user root \
        -e "ZAP_RULES=$ZAP_RULES" \
        ghcr.io/zaproxy/zaproxy:stable \
        sh -c "
          mkdir -p /zap/wrk &&
          echo \"\$ZAP_RULES\" > /zap/wrk/zap-rules.tsv &&
          zap-api-scan.py \
            -t http://api:8080/swagger/v1/swagger.json \
            -f openapi \
            -c /zap/wrk/zap-rules.tsv \
            -r /zap/wrk/zap-report.html \
            -w /zap/wrk/zap-report.md \
            -J /zap/wrk/zap-report.json \
            -I
        "

    # Копируем отчёты из контейнера
    - mkdir -p "$CI_PROJECT_DIR/zap-output"
    - docker cp zap-scan:/zap/wrk/zap-report.html "$CI_PROJECT_DIR/zap-output/" || true
    - docker cp zap-scan:/zap/wrk/zap-report.md   "$CI_PROJECT_DIR/zap-output/" || true
    - docker cp zap-scan:/zap/wrk/zap-report.json "$CI_PROJECT_DIR/zap-output/" || true

    # Pretty-print JSON
    - apk add --no-cache python3
    - python3 -m json.tool "$CI_PROJECT_DIR/zap-output/zap-report.json" \
      > "$CI_PROJECT_DIR/zap-output/zap-report-pretty.json"

  after_script:
    - docker rm -f api postgres zap-scan || true
    - docker network rm zapnet || true

  artifacts:
    when: always
    paths:
      - zap-output/

# ---------------------
# SCA (OWASP Dependency-Check)
# ---------------------
dependency-check:
  stage: sca
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]

  cache:
    key: dependency-check-protected
    paths:
      - .dependency-check/

  script:
    - mkdir -p dependency-check-report
    - mkdir -p .dependency-check

    - |
      /usr/share/dependency-check/bin/dependency-check.sh \
        --data .dependency-check \
        --scan . \
        --format ALL \
        --format JSON \
        --failOnCVSS 11 \
        --nvdApiKey "$NVD_API_KEY" \
        --out dependency-check-report

  artifacts:
    when: always
    paths:
      - dependency-check-report/